<!DOCTYPE html>
<html lang="en">

<body>
  <div id="projectm-host" class="is-disabled" aria-hidden="true"></div>

    id="viz-controls"
    style="position: fixed; top: 12px; right: 12px; z-index: 100; display: flex; flex-direction: column; align-items: flex-end; gap: 8px;"
  ></div>

  <header class="page-header">
    <h1>GameDudeSynth</h1>
    <p class="tagline">WAV Player</p>
    <nav>
      <a href="./engine.html?v=13550f8">← MIDI Export</a>

  <p class="help">
    Slide power ON · drag a .wav onto the Game Boy to play · ↑↓ select · A/START play · B stop · ←/→ skip ±15s while playing

  </footer>

  <script src="./public/vendor/projectm/projectm.js?v=13550f8"></script>
  <script src="./public/gameboy-ui.iife.js?v=13550f8"></script>
